name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 
          MYSQL_DATABASE: linguere_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: 
      DB_NAME: linguere_test
      JWT_SECRET: test_secret_ci
      JWT_EXPIRES_IN: 1d
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      EXCHANGE_RATE_BASE_CURRENCY: XOF

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Tests unitaires
        run: npm run test

      - name: Build NestJS
        run: npm run build

      - name: Tests e2e
        run: npm run test:e2e

  docker-build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image (validation uniquement)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: linguere-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-render:
    name: Déployer sur Render
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déclencher le déploiement Render
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
